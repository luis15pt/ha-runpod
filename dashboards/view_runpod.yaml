# ─────────────────────────────────────────────────────────────────────────────
# RunPod Dashboard View
# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT: Replace the example machine names below with YOUR machine names.
#
# This example uses 4 machines: alpha, bravo, charlie, delta
# Your entity IDs are based on your RunPod machine names, e.g.:
#   Machine "MyServer" → sensor.myserver_rented_gpus
#
# Find your entity IDs: Settings > Devices > RunPod > (click machine)
#
# Required HACS frontend plugins: mushroom-cards, apexcharts-card, card-mod
# ─────────────────────────────────────────────────────────────────────────────
theme: dark
title: RunPod
path: runpod
icon: mdi:server-network
badges: []
cards:
  - type: vertical-stack
    cards:
      # ── HEADER ────────────────────────────────────────────
      - type: custom:mushroom-title-card
        title: RunPod Fleet
        subtitle: >
          {% set rented = states('sensor.runpod_account_total_gpus_rented') | int(0) %}
          {% set total = states('sensor.runpod_account_total_gpus') | int(0) %}
          {% set pct = ((rented / total) * 100) | round(0) if total > 0 else 0 %}
          {{ rented }}/{{ total }} GPUs Rented · {{ pct }}% · ${{ states('sensor.runpod_account_earnings_today') | float(0) | round(2) }} today

      # ── FLEET OVERVIEW ─────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: GPUs Rented
            secondary: >
              {{ states('sensor.runpod_account_total_gpus_rented') }}/{{ states('sensor.runpod_account_total_gpus') }}
            icon: mdi:expansion-card-variant
            icon_color: >
              {% set rented = states('sensor.runpod_account_total_gpus_rented') | int(0) %}
              {% set total = states('sensor.runpod_account_total_gpus') | int(0) %}
              {% set pct = (rented / total * 100) if total > 0 else 0 %}
              {{ 'green' if pct > 70 else 'amber' if pct > 30 else 'red' }}
            layout: vertical
            tap_action:
              action: more-info
              entity: sensor.runpod_account_total_gpus_rented
            card_mod:
              style: |
                ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
                mushroom-shape-icon { --icon-size: 32px; --shape-size: 42px; }

          - type: custom:mushroom-template-card
            primary: Available
            secondary: >
              {{ states('sensor.runpod_account_total_gpus_available') }} GPUs
            icon: mdi:check-circle-outline
            icon_color: >
              {% set avail = states('sensor.runpod_account_total_gpus_available') | int(0) %}
              {{ 'green' if avail > 10 else 'amber' if avail > 5 else 'red' }}
            layout: vertical
            tap_action:
              action: more-info
              entity: sensor.runpod_account_total_gpus_available
            card_mod:
              style: |
                ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
                mushroom-shape-icon { --icon-size: 32px; --shape-size: 42px; }

          - type: custom:mushroom-template-card
            primary: Pods Running
            secondary: >
              {{ states('sensor.runpod_account_total_pods_running') }}
            icon: mdi:cube-send
            icon_color: >
              {% set pods = states('sensor.runpod_account_total_pods_running') | int(0) %}
              {{ 'green' if pods > 0 else 'disabled' }}
            layout: vertical
            tap_action:
              action: more-info
              entity: sensor.runpod_account_total_pods_running
            card_mod:
              style: |
                ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
                mushroom-shape-icon { --icon-size: 32px; --shape-size: 42px; }

          - type: custom:mushroom-template-card
            primary: Host Balance
            secondary: >
              ${{ states('sensor.runpod_account_host_balance') | float(0) | round(2) }}
            icon: mdi:wallet-outline
            icon_color: >
              {% set bal = states('sensor.runpod_account_host_balance') | float(0) %}
              {{ 'green' if bal > 50 else 'amber' if bal > 20 else 'red' }}
            layout: vertical
            tap_action:
              action: more-info
              entity: sensor.runpod_account_host_balance
            card_mod:
              style: |
                ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
                mushroom-shape-icon { --icon-size: 32px; --shape-size: 42px; }

      # ── EARNINGS ───────────────────────────────────────────
      - type: custom:mushroom-title-card
        title: Earnings
        subtitle: ""

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Today
            secondary: >
              ${{ states('sensor.runpod_account_earnings_today') | float(0) | round(2) }}
            icon: mdi:cash-clock
            icon_color: green
            layout: vertical
            tap_action:
              action: more-info
              entity: sensor.runpod_account_earnings_today
            card_mod:
              style: |
                ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
                mushroom-shape-icon { --icon-size: 32px; --shape-size: 42px; }

          - type: custom:mushroom-template-card
            primary: Yesterday
            secondary: >
              ${{ states('sensor.runpod_account_earnings_yesterday') | float(0) | round(2) }}
            icon: mdi:cash-register
            icon_color: blue
            layout: vertical
            tap_action:
              action: more-info
              entity: sensor.runpod_account_earnings_yesterday
            card_mod:
              style: |
                ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
                mushroom-shape-icon { --icon-size: 32px; --shape-size: 42px; }

          - type: custom:mushroom-template-card
            primary: Revenue/hr
            secondary: >
              {% set rev = states('sensor.alpha_rental_revenue_per_hour') | float(0)
                + states('sensor.bravo_rental_revenue_per_hour') | float(0)
                + states('sensor.charlie_rental_revenue_per_hour') | float(0)
                + states('sensor.delta_rental_revenue_per_hour') | float(0) %}
              ${{ '%.2f' | format(rev) }}/hr
            icon: mdi:cash-fast
            icon_color: >
              {% set rev = states('sensor.alpha_rental_revenue_per_hour') | float(0)
                + states('sensor.bravo_rental_revenue_per_hour') | float(0)
                + states('sensor.charlie_rental_revenue_per_hour') | float(0)
                + states('sensor.delta_rental_revenue_per_hour') | float(0) %}
              {{ 'green' if rev > 2 else 'amber' if rev > 0.5 else 'red' }}
            layout: vertical
            card_mod:
              style: |
                ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
                mushroom-shape-icon { --icon-size: 32px; --shape-size: 42px; }

          - type: custom:mushroom-template-card
            primary: Projected/day
            secondary: >
              {% set rev = states('sensor.alpha_rental_revenue_per_hour') | float(0)
                + states('sensor.bravo_rental_revenue_per_hour') | float(0)
                + states('sensor.charlie_rental_revenue_per_hour') | float(0)
                + states('sensor.delta_rental_revenue_per_hour') | float(0) %}
              ${{ '%.2f' | format(rev * 24) }}/day
            icon: mdi:chart-line
            icon_color: >
              {% set rev = states('sensor.alpha_rental_revenue_per_hour') | float(0)
                + states('sensor.bravo_rental_revenue_per_hour') | float(0)
                + states('sensor.charlie_rental_revenue_per_hour') | float(0)
                + states('sensor.delta_rental_revenue_per_hour') | float(0) %}
              {{ 'green' if rev * 24 > 50 else 'amber' if rev * 24 > 10 else 'red' }}
            layout: vertical
            card_mod:
              style: |
                ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
                mushroom-shape-icon { --icon-size: 32px; --shape-size: 42px; }

      # ── MACHINES ───────────────────────────────────────────
      - type: custom:mushroom-title-card
        title: Machines
        subtitle: ""

      - type: horizontal-stack
        cards:
          # ALPHA (replace with your machine name)
          - type: vertical-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Alpha
                secondary: >
                  {{ states('sensor.alpha_gpu_type') }} · {{ states('sensor.alpha_rented_gpus') }}/{{ states('sensor.alpha_total_gpus') }} GPUs
                icon: mdi:server
                icon_color: >
                  {% set rented = states('sensor.alpha_rented_gpus') | int(0) %}
                  {{ 'green' if rented > 0 else 'disabled' }}
                tap_action:
                  action: more-info
                  entity: sensor.alpha_earnings_today
                card_mod:
                  style: |
                    ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
              - type: entities
                card_mod:
                  style: |
                    ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
                entities:
                  - entity: sensor.alpha_rented_gpus
                    name: Rented GPUs
                  - entity: sensor.alpha_pods_running
                    name: Pods Running
                  - entity: sensor.alpha_rental_revenue_per_hour
                    name: Revenue/hr
                  - entity: sensor.alpha_earnings_today
                    name: Earnings Today
                  - entity: sensor.alpha_status
                    name: Status

          # BRAVO (replace with your machine name)
          - type: vertical-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Bravo
                secondary: >
                  {{ states('sensor.bravo_gpu_type') }} · {{ states('sensor.bravo_rented_gpus') }}/{{ states('sensor.bravo_total_gpus') }} GPUs
                icon: mdi:server
                icon_color: >
                  {% set rented = states('sensor.bravo_rented_gpus') | int(0) %}
                  {{ 'green' if rented > 0 else 'disabled' }}
                tap_action:
                  action: more-info
                  entity: sensor.bravo_earnings_today
                card_mod:
                  style: |
                    ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
              - type: entities
                card_mod:
                  style: |
                    ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
                entities:
                  - entity: sensor.bravo_rented_gpus
                    name: Rented GPUs
                  - entity: sensor.bravo_pods_running
                    name: Pods Running
                  - entity: sensor.bravo_rental_revenue_per_hour
                    name: Revenue/hr
                  - entity: sensor.bravo_earnings_today
                    name: Earnings Today
                  - entity: sensor.bravo_status
                    name: Status

      - type: horizontal-stack
        cards:
          # CHARLIE (replace with your machine name)
          - type: vertical-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Charlie
                secondary: >
                  {{ states('sensor.charlie_gpu_type') }} · {{ states('sensor.charlie_rented_gpus') }}/{{ states('sensor.charlie_total_gpus') }} GPUs
                icon: mdi:server
                icon_color: >
                  {% set rented = states('sensor.charlie_rented_gpus') | int(0) %}
                  {{ 'green' if rented > 0 else 'disabled' }}
                tap_action:
                  action: more-info
                  entity: sensor.charlie_earnings_today
                card_mod:
                  style: |
                    ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
              - type: entities
                card_mod:
                  style: |
                    ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
                entities:
                  - entity: sensor.charlie_rented_gpus
                    name: Rented GPUs
                  - entity: sensor.charlie_pods_running
                    name: Pods Running
                  - entity: sensor.charlie_rental_revenue_per_hour
                    name: Revenue/hr
                  - entity: sensor.charlie_earnings_today
                    name: Earnings Today
                  - entity: sensor.charlie_status
                    name: Status

          # DELTA (replace with your machine name)
          - type: vertical-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Delta
                secondary: >
                  {{ states('sensor.delta_gpu_type') }} · {{ states('sensor.delta_rented_gpus') }}/{{ states('sensor.delta_total_gpus') }} GPUs
                icon: mdi:server
                icon_color: >
                  {% set rented = states('sensor.delta_rented_gpus') | int(0) %}
                  {{ 'green' if rented > 0 else 'disabled' }}
                tap_action:
                  action: more-info
                  entity: sensor.delta_earnings_today
                card_mod:
                  style: |
                    ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
              - type: entities
                card_mod:
                  style: |
                    ha-card { background: rgba(0,0,0,0.2); border-radius: 12px; }
                entities:
                  - entity: sensor.delta_rented_gpus
                    name: Rented GPUs
                  - entity: sensor.delta_pods_running
                    name: Pods Running
                  - entity: sensor.delta_rental_revenue_per_hour
                    name: Revenue/hr
                  - entity: sensor.delta_earnings_today
                    name: Earnings Today
                  - entity: sensor.delta_status
                    name: Status

      # ── EARNINGS CHART (7d) ─────────────────────────────────
      - type: custom:mushroom-title-card
        title: Earnings History
        subtitle: ""

      - type: custom:apexcharts-card
        header:
          show: true
          title: Earnings per Machine (7d)
        graph_span: 7d
        series:
          - entity: sensor.alpha_earnings_today
            name: Alpha
            type: line
            stroke_width: 2
            curve: smooth
            color: "#e24b4a"
            group_by:
              func: avg
              duration: 1h
          - entity: sensor.bravo_earnings_today
            name: Bravo
            type: line
            stroke_width: 2
            curve: smooth
            color: "#378ADD"
            group_by:
              func: avg
              duration: 1h
          - entity: sensor.charlie_earnings_today
            name: Charlie
            type: line
            stroke_width: 2
            curve: smooth
            color: "#1D9E75"
            group_by:
              func: avg
              duration: 1h
          - entity: sensor.delta_earnings_today
            name: Delta
            type: line
            stroke_width: 2
            curve: smooth
            color: "#FFA500"
            group_by:
              func: avg
              duration: 1h
        apex_config:
          chart:
            height: 250px
          yaxis:
            min: 0
          legend:
            show: true
            position: top
          xaxis:
            type: datetime
          tooltip:
            theme: dark
        card_mod:
          style: |
            ha-card {
              background: rgba(0, 0, 0, 0.2);
              border-radius: 12px;
            }

      # ── GPU RENTAL CHART (7d) ───────────────────────────────
      - type: custom:apexcharts-card
        header:
          show: true
          title: GPUs Rented per Machine (7d)
        graph_span: 7d
        series:
          - entity: sensor.alpha_rented_gpus
            name: Alpha
            type: line
            stroke_width: 2
            curve: stepline
            color: "#e24b4a"
          - entity: sensor.bravo_rented_gpus
            name: Bravo
            type: line
            stroke_width: 2
            curve: stepline
            color: "#378ADD"
          - entity: sensor.charlie_rented_gpus
            name: Charlie
            type: line
            stroke_width: 2
            curve: stepline
            color: "#1D9E75"
          - entity: sensor.delta_rented_gpus
            name: Delta
            type: line
            stroke_width: 2
            curve: stepline
            color: "#FFA500"
        apex_config:
          chart:
            height: 200px
          yaxis:
            min: 0
            max: 6
            tickAmount: 6
          legend:
            show: true
            position: top
          xaxis:
            type: datetime
          tooltip:
            theme: dark
        card_mod:
          style: |
            ha-card {
              background: rgba(0, 0, 0, 0.2);
              border-radius: 12px;
            }

      # ── REVENUE TABLE ───────────────────────────────────────
      - type: custom:mushroom-title-card
        title: Revenue Breakdown
        subtitle: ""

      - type: markdown
        content: >
          {% set a_rev = states('sensor.alpha_rental_revenue_per_hour') | float(0) %}
          {% set b_rev = states('sensor.bravo_rental_revenue_per_hour') | float(0) %}
          {% set c_rev = states('sensor.charlie_rental_revenue_per_hour') | float(0) %}
          {% set d_rev = states('sensor.delta_rental_revenue_per_hour') | float(0) %}
          {% set total_rev = a_rev + b_rev + c_rev + d_rev %}
          {% set a_earn = states('sensor.alpha_earnings_today') | float(0) %}
          {% set b_earn = states('sensor.bravo_earnings_today') | float(0) %}
          {% set c_earn = states('sensor.charlie_earnings_today') | float(0) %}
          {% set d_earn = states('sensor.delta_earnings_today') | float(0) %}

          | Machine | GPU | Rented | Today | $/hr | $/day proj. |
          |:--------|:----|-------:|------:|-----:|------------:|
          | **Alpha** | {{ states('sensor.alpha_gpu_type') }} | {{ states('sensor.alpha_rented_gpus') }}/{{ states('sensor.alpha_total_gpus') }} | ${{ '%.2f' | format(a_earn) }} | ${{ '%.2f' | format(a_rev) }} | ${{ '%.2f' | format(a_rev * 24) }} |
          | **Bravo** | {{ states('sensor.bravo_gpu_type') }} | {{ states('sensor.bravo_rented_gpus') }}/{{ states('sensor.bravo_total_gpus') }} | ${{ '%.2f' | format(b_earn) }} | ${{ '%.2f' | format(b_rev) }} | ${{ '%.2f' | format(b_rev * 24) }} |
          | **Charlie** | {{ states('sensor.charlie_gpu_type') }} | {{ states('sensor.charlie_rented_gpus') }}/{{ states('sensor.charlie_total_gpus') }} | ${{ '%.2f' | format(c_earn) }} | ${{ '%.2f' | format(c_rev) }} | ${{ '%.2f' | format(c_rev * 24) }} |
          | **Delta** | {{ states('sensor.delta_gpu_type') }} | {{ states('sensor.delta_rented_gpus') }}/{{ states('sensor.delta_total_gpus') }} | ${{ '%.2f' | format(d_earn) }} | ${{ '%.2f' | format(d_rev) }} | ${{ '%.2f' | format(d_rev * 24) }} |
          | **Total** | | | **${{ '%.2f' | format(a_earn + b_earn + c_earn + d_earn) }}** | **${{ '%.2f' | format(total_rev) }}** | **${{ '%.2f' | format(total_rev * 24) }}** |
        card_mod:
          style: |
            ha-card {
              background: rgba(0, 0, 0, 0.2);
              border-radius: 12px;
            }
